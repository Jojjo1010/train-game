<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Train Defense — Game Tuner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script type="importmap">
    { "imports": {
      "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
    }}
  </script>
  <style>
    :root {
      --bg-0: #09090b; --bg-1: #18181b; --bg-2: #27272a;
      --border: #3f3f46; --border-hover: #52525b;
      --text: #fafafa; --text-muted: #a1a1aa; --text-dim: #71717a;
      --accent: #f59e0b; --accent-dim: #92400e;
      --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --purple: #a855f7; --cyan: #06b6d4;
      --radius: 8px; --radius-lg: 12px;
      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font); background: var(--bg-0); color: var(--text); line-height: 1.5; }

    .header { position: sticky; top: 0; z-index: 20; background: var(--bg-0); border-bottom: 1px solid var(--border); }
    .header-inner { max-width: 1440px; margin: 0 auto; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header h1 span { color: var(--accent); }
    .header .sep { width: 1px; height: 24px; background: var(--border); }
    .header .status { font-size: 13px; color: var(--text-dim); font-family: var(--mono); }
    .header .actions { margin-left: auto; display: flex; gap: 8px; }

    .btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-weight: 500; font-family: var(--font); cursor: pointer; transition: all 0.15s; background: var(--bg-2); color: var(--text); }
    .btn:hover { border-color: var(--border-hover); background: #333; }
    .btn-primary { background: var(--green); border-color: var(--green); color: #000; font-weight: 600; }
    .btn-primary:hover { background: #16a34a; }
    .btn-primary.saved { background: var(--bg-2); border-color: var(--border); color: var(--text-dim); }
    .btn-danger { color: var(--red); }
    .btn-danger:hover { background: rgba(239,68,68,0.1); border-color: var(--red); }

    .content { max-width: 1440px; margin: 0 auto; padding: 24px; }

    .preview-bar { margin-bottom: 24px; background: var(--bg-1); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .preview-bar h3 { padding: 12px 16px 0; font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .preview-canvas { width: 100%; height: 200px; display: block; }
    .preview-labels { display: flex; gap: 24px; padding: 8px 16px 12px; font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
    .preview-labels span { display: flex; align-items: center; gap: 6px; }
    .preview-labels .dot { width: 8px; height: 8px; border-radius: 50%; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

    .card { background: #1c1c20; border: 1px solid #404048; border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.15s; }
    .card:hover { border-color: var(--border-hover); }
    .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .card-header .icon { font-size: 14px; }
    .card-header h2 { font-size: 14px; font-weight: 600; }
    .card-header .count { margin-left: auto; font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
    .card-body { padding: 4px 0; }

    .slider-row { display: flex; align-items: center; gap: 8px; padding: 5px 16px; transition: background 0.1s; }
    .slider-row:hover { background: rgba(255,255,255,0.02); }
    .slider-row label { width: 130px; font-size: 12px; color: #d4d4d8; flex-shrink: 0; cursor: help; }
    .slider-row .track-wrap { flex: 1; min-width: 60px; }
    .slider-row .val { width: 62px; text-align: right; font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent); flex-shrink: 0; background: var(--bg-2); border: 1px solid transparent; border-radius: 4px; padding: 2px 6px; outline: none; -moz-appearance: textfield; }
    .slider-row .val:focus { border-color: var(--accent); background: var(--bg-0); }
    .slider-row .val::-webkit-inner-spin-button, .slider-row .val::-webkit-outer-spin-button { -webkit-appearance: none; }
    .slider-row .val.changed { color: #fbbf24; }
    .slider-row .val.default { color: var(--text-dim); }
    .slider-row .desc { font-size: 10px; color: var(--text-dim); padding: 0 16px 6px; line-height: 1.3; }

    input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; background: #3f3f46; border-radius: 3px; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); border: 2px solid #fbbf24; cursor: grab; transition: box-shadow 0.15s; margin-top: -6px; }
    input[type=range]::-webkit-slider-thumb:hover { box-shadow: 0 0 0 5px rgba(245,158,11,0.25); }
    input[type=range]::-webkit-slider-thumb:active { cursor: grabbing; box-shadow: 0 0 0 7px rgba(245,158,11,0.35); }
    input[type=range]::-moz-range-track { height: 6px; background: #3f3f46; border-radius: 3px; border: none; }
    input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); border: 2px solid #fbbf24; cursor: grab; }

    .card[data-color="green"] .card-header { border-left: 3px solid var(--green); }
    .card[data-color="red"] .card-header { border-left: 3px solid var(--red); }
    .card[data-color="blue"] .card-header { border-left: 3px solid var(--blue); }
    .card[data-color="cyan"] .card-header { border-left: 3px solid var(--cyan); }
    .card[data-color="amber"] .card-header { border-left: 3px solid var(--accent); }
    .card[data-color="purple"] .card-header { border-left: 3px solid var(--purple); }
    .card[data-color="orange"] .card-header { border-left: 3px solid #ffb74d; }
    .card[data-color="sky"] .card-header { border-left: 3px solid #8ecae6; }
    .card[data-color="violet"] .card-header { border-left: 3px solid #b388ff; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <h1><span>Train Defense</span> Tuner</h1>
      <div class="sep"></div>
      <span class="status" id="status">Loading...</span>
      <div class="actions">
        <button class="btn btn-danger" onclick="resetAll()">Reset All</button>
        <button class="btn btn-primary" id="saveBtn" onclick="save()">Save</button>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="preview-bar">
      <h3>3D Preview</h3>
      <canvas class="preview-canvas" id="preview"></canvas>
      <div class="preview-labels">
        <span><span class="dot" style="background:#8e44ad"></span> Purple Enemy</span>
        <span><span class="dot" style="background:#c0392b"></span> Red Enemy</span>
        <span><span class="dot" style="background:#888"></span> Train</span>
      </div>
    </div>
    <div class="grid" id="sections"></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

    // ======= 3D PREVIEW =======
    const previewCanvas = document.getElementById('preview');
    const previewRenderer = new THREE.WebGLRenderer({ canvas: previewCanvas, antialias: true });
    previewRenderer.setPixelRatio(window.devicePixelRatio);
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x18181b);
    const camera = new THREE.PerspectiveCamera(35, 4, 0.1, 2000);
    camera.position.set(200, 120, 200);
    camera.lookAt(0, 10, 0);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(100, 150, 100);
    scene.add(dirLight);
    scene.add(new THREE.GridHelper(400, 40, 0x3f3f46, 0x27272a));

    const loader = new FBXLoader();
    loader.load('/assets/Train.fbx', obj => { obj.scale.setScalar(0.05); obj.position.set(60, 0, 0); scene.add(obj); });
    loader.load('/assets/enemy.fbx', obj => {
      const p = obj.clone(); p.scale.setScalar(0.045 * 1.5); p.position.set(-60, 0, 0); scene.add(p); window._pm = p;
      const r = obj.clone(); r.scale.setScalar(0.045 * 5); r.position.set(-20, 0, 0);
      r.traverse(c => { if (c.isMesh && c.material) { c.material = c.material.clone(); c.material.color.set(0xc0392b); } });
      scene.add(r); window._rm = r;
    });

    function resizePreview() {
      const w = previewCanvas.parentElement.getBoundingClientRect().width;
      previewRenderer.setSize(w, 200); camera.aspect = w / 200; camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resizePreview); resizePreview();

    let angle = 0;
    (function animate() {
      angle += 0.003;
      camera.position.set(Math.cos(angle) * 280, 120, Math.sin(angle) * 280);
      camera.lookAt(0, 10, 0);
      previewRenderer.render(scene, camera);
      requestAnimationFrame(animate);
    })();

    window.updatePreview = function(v) {
      if (window._pm) window._pm.scale.setScalar(0.045 * (v.ENEMY_PURPLE_RADIUS_MULT || 1.5));
      if (window._rm) window._rm.scale.setScalar(0.045 * (v.ENEMY_RED_RADIUS_MULT || 5));
    };

    // ======= PARAMS — simplified with descriptions =======
    const PARAMS = [
      // Train
      { section: 'Your Train', color: 'green', icon: '🚂', key: 'TRAIN_MAX_HP', label: 'Max HP', desc: 'How much damage your train can take before dying', default: 100, min: 20, max: 500, step: 10 },
      { section: 'Your Train', key: 'TRAIN_SPEED', label: 'Travel Speed', desc: 'How fast the train moves during combat — higher = shorter fights', default: 167, min: 50, max: 400, step: 1 },
      { section: 'Your Train', key: 'CAR_WIDTH', label: 'Hitbox Width', desc: 'Width of each car\'s collision box — bigger = easier to hit', default: 32, min: 10, max: 100, step: 1 },
      { section: 'Your Train', key: 'CAR_HEIGHT', label: 'Hitbox Depth', desc: 'Depth of each car\'s collision box', default: 14, min: 5, max: 60, step: 1 },
      { section: 'Your Train', key: 'CARGO_BOXES_START', label: 'Cargo Boxes', desc: 'Starting cargo — each box adds to your gold multiplier on win', default: 4, min: 0, max: 8, step: 1 },
      { section: 'Your Train', key: 'CARGO_MULTIPLIER_PER_BOX', label: 'Gold Mult/Box', desc: 'How much each cargo box adds to your gold multiplier', default: 0.25, min: 0.05, max: 1, step: 0.05 },

      // Enemies
      { section: 'Enemies', color: 'red', icon: '👾', key: 'ENEMY_BASE_HP', label: 'Base HP', desc: 'Starting health of the weakest enemies', default: 20, min: 5, max: 200, step: 5 },
      { section: 'Enemies', key: 'ENEMY_BASE_SPEED', label: 'Base Speed', desc: 'How fast enemies move toward your train', default: 50, min: 10, max: 200, step: 5 },
      { section: 'Enemies', key: 'ENEMY_RADIUS', label: 'Base Size', desc: 'Collision radius of the smallest enemies', default: 6, min: 2, max: 30, step: 1 },
      { section: 'Enemies', key: 'ENEMY_CONTACT_DAMAGE', label: 'Contact Damage', desc: 'Damage dealt when an enemy reaches your train', default: 6, min: 1, max: 30, step: 1 },
      { section: 'Enemies', key: 'ENEMY_SPAWN_INTERVAL_START', label: 'Spawn Rate (start)', desc: 'Seconds between spawns at the start — lower = more enemies', default: 1.5, min: 0.2, max: 5, step: 0.1 },
      { section: 'Enemies', key: 'ENEMY_SPAWN_INTERVAL_MIN', label: 'Spawn Rate (fastest)', desc: 'Minimum spawn interval at max difficulty', default: 0.25, min: 0.05, max: 2, step: 0.05 },
      { section: 'Enemies', key: 'ENEMY_PURPLE_RADIUS_MULT', label: 'Purple Size', desc: 'How big purple (easy) enemies are relative to base', default: 1.5, min: 0.5, max: 5, step: 0.25 },
      { section: 'Enemies', key: 'ENEMY_RED_RADIUS_MULT', label: 'Red Size', desc: 'How big red (hard) enemies are relative to base', default: 5, min: 1, max: 10, step: 0.5 },
      { section: 'Enemies', key: 'ENEMY_PURPLE_HP_MULT', label: 'Purple HP Mult', desc: 'HP multiplier for purple enemies', default: 1, min: 0.5, max: 5, step: 0.5 },
      { section: 'Enemies', key: 'ENEMY_RED1_HP_MULT', label: 'Red (mid) HP Mult', desc: 'HP multiplier for medium-difficulty red enemies', default: 4, min: 1, max: 15, step: 0.5 },
      { section: 'Enemies', key: 'ENEMY_RED2_HP_MULT', label: 'Red (hard) HP Mult', desc: 'HP multiplier for the toughest red enemies', default: 6, min: 1, max: 20, step: 0.5 },

      // Crew Weapons
      { section: 'Crew Weapons', color: 'blue', icon: '🎯', key: 'WEAPON_DAMAGE', label: 'Damage', desc: 'Damage per shot from crew-manned weapons', default: 12, min: 1, max: 50, step: 1 },
      { section: 'Crew Weapons', key: 'WEAPON_FIRE_RATE', label: 'Fire Rate', desc: 'Shots per second for crew weapons', default: 5, min: 1, max: 20, step: 0.5 },
      { section: 'Crew Weapons', key: 'WEAPON_RANGE', label: 'Range', desc: 'How far crew weapons can shoot', default: 220, min: 50, max: 500, step: 10 },
      { section: 'Crew Weapons', key: 'PROJECTILE_SPEED', label: 'Bullet Speed', desc: 'How fast bullets travel', default: 350, min: 100, max: 800, step: 10 },
      { section: 'Crew Weapons', key: 'PROJECTILE_LIFETIME', label: 'Bullet Lifetime', desc: 'How long bullets exist (seconds) before vanishing', default: 2, min: 0.5, max: 5, step: 0.25 },
      { section: 'Crew Weapons', key: 'PROJECTILE_RADIUS', label: 'Bullet Size', desc: 'Collision radius of bullets — bigger = easier to hit', default: 3, min: 1, max: 10, step: 1 },
      { section: 'Crew Weapons', key: 'DRIVER_DAMAGE_BUFF', label: 'Driver Bonus', desc: 'Damage multiplier when someone is driving the train', default: 1.5, min: 1, max: 3, step: 0.1 },

      // Turret (base + scaling)
      { section: 'Turret', color: 'orange', icon: '🔫', key: 'TURRET_LV1_DAMAGE', label: 'Base Damage', desc: 'Damage at level 1', default: 10, min: 1, max: 50, step: 1 },
      { section: 'Turret', key: 'TURRET_DAMAGE_GROWTH', label: 'Damage/Level', desc: 'Extra damage per level', default: 2, min: 0, max: 10, step: 1 },
      { section: 'Turret', key: 'TURRET_LV1_FIRE_INTERVAL', label: 'Base Fire Interval', desc: 'Seconds between shots at level 1 — lower = faster', default: 1.2, min: 0.2, max: 3, step: 0.05 },
      { section: 'Turret', key: 'TURRET_INTERVAL_REDUCTION', label: 'Interval Reduction/Lv', desc: 'How much faster per level', default: 0.1, min: 0, max: 0.5, step: 0.025 },
      { section: 'Turret', key: 'TURRET_LV1_RANGE', label: 'Base Range', desc: 'Targeting range at level 1', default: 250, min: 100, max: 600, step: 10 },
      { section: 'Turret', key: 'TURRET_RANGE_GROWTH', label: 'Range/Level', desc: 'Extra range per level', default: 20, min: 0, max: 50, step: 5 },
      { section: 'Turret', key: 'TURRET_LV1_SHOTS', label: 'Base Shots/Burst', desc: 'Projectiles per burst at level 1', default: 1, min: 1, max: 10, step: 1 },
      { section: 'Turret', key: 'TURRET_SHOT_GROWTH', label: 'Extra Shot/Level', desc: 'Additional projectiles per level', default: 1, min: 0, max: 3, step: 1 },

      // Steam Blast (base + scaling)
      { section: 'Steam Blast', color: 'sky', icon: '💨', key: 'STEAM_LV1_RADIUS', label: 'Base Radius', desc: 'Damage aura size at level 1', default: 80, min: 20, max: 400, step: 5 },
      { section: 'Steam Blast', key: 'STEAM_RADIUS_GROWTH', label: 'Radius/Level', desc: 'Extra aura size per level', default: 25, min: 0, max: 50, step: 5 },
      { section: 'Steam Blast', key: 'STEAM_LV1_DAMAGE', label: 'Base Damage', desc: 'Damage per tick at level 1', default: 4, min: 1, max: 50, step: 1 },
      { section: 'Steam Blast', key: 'STEAM_DAMAGE_GROWTH', label: 'Damage/Level', desc: 'Extra damage per level', default: 3, min: 0, max: 10, step: 1 },
      { section: 'Steam Blast', key: 'STEAM_LV1_TICK_RATE', label: 'Base Tick Rate', desc: 'Seconds between damage ticks — lower = more DPS', default: 0.5, min: 0.1, max: 2, step: 0.05 },
      { section: 'Steam Blast', key: 'STEAM_TICK_REDUCTION', label: 'Tick Reduction/Lv', desc: 'How much faster ticks get per level', default: 0.05, min: 0, max: 0.2, step: 0.01 },

      // Laser (base + scaling)
      { section: 'Laser', color: 'violet', icon: '⚡', key: 'LASER_LV1_BOUNCES', label: 'Base Bounces', desc: 'Number of enemy bounces at level 1', default: 2, min: 1, max: 15, step: 1 },
      { section: 'Laser', key: 'LASER_BOUNCE_GROWTH', label: 'Bounces/Level', desc: 'Extra bounces per level', default: 1, min: 0, max: 3, step: 1 },
      { section: 'Laser', key: 'LASER_LV1_DAMAGE', label: 'Base Damage', desc: 'Damage per hit at level 1', default: 8, min: 1, max: 50, step: 1 },
      { section: 'Laser', key: 'LASER_DAMAGE_GROWTH', label: 'Damage/Level', desc: 'Extra damage per level', default: 3, min: 0, max: 10, step: 1 },
      { section: 'Laser', key: 'LASER_LV1_FIRE_INTERVAL', label: 'Base Fire Interval', desc: 'Seconds between shots — lower = faster', default: 2.5, min: 0.3, max: 5, step: 0.1 },
      { section: 'Laser', key: 'LASER_INTERVAL_REDUCTION', label: 'Interval Reduction/Lv', desc: 'How much faster per level', default: 0.3, min: 0, max: 1, step: 0.05 },
      { section: 'Laser', key: 'LASER_LV1_SPEED', label: 'Base Speed', desc: 'Bolt travel speed at level 1', default: 300, min: 100, max: 800, step: 10 },
      { section: 'Laser', key: 'LASER_SPEED_GROWTH', label: 'Speed/Level', desc: 'Extra bolt speed per level', default: 25, min: 0, max: 50, step: 5 },

      // Progression
      { section: 'Progression', color: 'cyan', icon: '📈', key: 'XP_PER_KILL', label: 'XP per Kill', desc: 'Experience gained from each enemy killed', default: 12, min: 1, max: 50, step: 1 },
      { section: 'Progression', key: 'XP_PER_LEVEL', label: 'XP per Level', desc: 'XP needed to level up — higher = slower progression', default: 80, min: 10, max: 300, step: 5 },
      { section: 'Progression', key: 'TARGET_DISTANCE', label: 'Run Distance', desc: 'How far the train travels per combat — higher = longer fights', default: 10000, min: 2000, max: 30000, step: 500 },

      // World
      { section: 'World', color: 'cyan', icon: '🗺', key: 'ZONES_PER_WORLD', label: 'Zones per World', desc: 'Number of zones to complete before winning', default: 3, min: 1, max: 10, step: 1 },
      { section: 'World', key: 'GOLD_PER_STATION', label: 'Gold per Station', desc: 'Bonus gold for each station visited when completing a zone', default: 25, min: 5, max: 100, step: 5 },
      { section: 'World', key: 'COAL_PER_WIN', label: 'Coal per Win', desc: 'Coal refueled after winning a combat', default: 2, min: 0, max: 5, step: 1 },
      { section: 'World', key: 'COIN_VALUE', label: 'Coin Value', desc: 'Gold earned per coin collected', default: 10, min: 1, max: 50, step: 1 },
      { section: 'World', key: 'COIN_SPAWN_INTERVAL', label: 'Coin Spawn Rate', desc: 'Seconds between coin spawns — lower = more coins', default: 3, min: 0.5, max: 10, step: 0.5 },

      // Shop upgrades
      { section: 'Shop Upgrades', color: 'purple', icon: '🏪', key: 'SHOP_DAMAGE_COST', label: 'Damage Cost', desc: 'Base gold cost for weapon damage upgrade', default: 40, min: 5, max: 200, step: 5 },
      { section: 'Shop Upgrades', key: 'SHOP_DAMAGE_PER_LEVEL', label: 'Damage %/Lv', desc: 'Percentage damage increase per shop level', default: 15, min: 5, max: 50, step: 1 },
      { section: 'Shop Upgrades', key: 'SHOP_SHIELD_COST', label: 'Shield Cost', desc: 'Base gold cost for shield upgrade', default: 35, min: 5, max: 200, step: 5 },
      { section: 'Shop Upgrades', key: 'SHOP_SHIELD_PER_LEVEL', label: 'Shield Reduction/Lv', desc: 'Damage reduced per hit per shop level', default: 2, min: 1, max: 10, step: 1 },
      { section: 'Shop Upgrades', key: 'SHOP_COOLOFF_COST', label: 'Cool-off Cost', desc: 'Base gold cost for cooldown upgrade', default: 45, min: 5, max: 200, step: 5 },
      { section: 'Shop Upgrades', key: 'SHOP_COOLOFF_PER_LEVEL', label: 'Cool-off %/Lv', desc: 'Cooldown reduction per shop level', default: 10, min: 2, max: 30, step: 1 },
      { section: 'Shop Upgrades', key: 'SHOP_MAXHP_COST', label: 'Hull Cost', desc: 'Base gold cost for max HP upgrade', default: 30, min: 5, max: 200, step: 5 },
      { section: 'Shop Upgrades', key: 'SHOP_MAXHP_PER_LEVEL', label: 'HP/Level', desc: 'Extra max HP per shop level', default: 15, min: 5, max: 50, step: 5 },
      { section: 'Shop Upgrades', key: 'SHOP_RANGE_COST', label: 'Range Cost', desc: 'Base gold cost for range upgrade', default: 40, min: 5, max: 200, step: 5 },
      { section: 'Shop Upgrades', key: 'SHOP_RANGE_PER_LEVEL', label: 'Range %/Lv', desc: 'Range increase per shop level', default: 15, min: 5, max: 50, step: 1 },
      { section: 'Shop Upgrades', key: 'SHOP_GREED_COST', label: 'Greed Cost', desc: 'Base gold cost for greed upgrade', default: 60, min: 10, max: 300, step: 5 },
      { section: 'Shop Upgrades', key: 'SHOP_GREED_PER_LEVEL', label: 'Greed %/Lv', desc: 'Extra gold from coins per shop level', default: 20, min: 5, max: 50, step: 5 },
      { section: 'Shop Upgrades', key: 'SHOP_CREW_COST', label: 'Crew Slot Cost', desc: 'Gold to unlock an additional crew member', default: 100, min: 20, max: 500, step: 10 },
    ];

    const sectionMeta = {};
    for (const p of PARAMS) {
      if (p.color && !sectionMeta[p.section]) sectionMeta[p.section] = { color: p.color, icon: p.icon };
    }

    let values = {};
    let dirty = false;

    async function load() {
      let saved = {};
      try { const r = await fetch('/tuning.json'); if (r.ok) saved = await r.json(); } catch(e) {}
      values = {};
      for (const p of PARAMS) values[p.key] = saved[p.key] ?? p.default;
    }

    function render() {
      const container = document.getElementById('sections');
      container.innerHTML = '';
      const sectionEls = {};

      for (const p of PARAMS) {
        const meta = sectionMeta[p.section] || { color: 'cyan', icon: '⚙' };
        if (!sectionEls[p.section]) {
          const card = document.createElement('div');
          card.className = 'card';
          card.dataset.color = meta.color;
          const count = PARAMS.filter(pp => pp.section === p.section).length;
          card.innerHTML = `<div class="card-header"><span class="icon">${meta.icon}</span><h2>${p.section}</h2><span class="count">${count}</span></div><div class="card-body"></div>`;
          container.appendChild(card);
          sectionEls[p.section] = card.querySelector('.card-body');
        }

        const isFloat = p.step < 1;
        const isChanged = values[p.key] !== p.default;
        const displayVal = isFloat ? values[p.key].toFixed(2) : values[p.key];

        const wrapper = document.createElement('div');
        wrapper.innerHTML = `
          <div class="slider-row">
            <label title="${p.desc}">${p.label}</label>
            <div class="track-wrap"><input type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${values[p.key]}"></div>
            <input type="number" class="val ${isChanged ? 'changed' : 'default'}" id="val-${p.key}" value="${displayVal}" step="${p.step}" min="${p.min}" max="${p.max}">
          </div>
          <div class="desc">${p.desc}</div>
        `;
        sectionEls[p.section].appendChild(wrapper);

        const slider = wrapper.querySelector('input[type=range]');
        const numInput = wrapper.querySelector('input[type=number]');

        function update(v) {
          v = Math.max(p.min, Math.min(p.max, v));
          values[p.key] = v;
          numInput.className = `val ${v !== p.default ? 'changed' : 'default'}`;
          setDirty(true);
          if (window.updatePreview) window.updatePreview(values);
        }

        slider.addEventListener('input', () => { const v = parseFloat(slider.value); update(v); numInput.value = isFloat ? v.toFixed(2) : v; });
        numInput.addEventListener('input', () => { const v = parseFloat(numInput.value); if (!isNaN(v)) { update(v); slider.value = v; } });
        numInput.addEventListener('blur', () => { numInput.value = isFloat ? values[p.key].toFixed(2) : values[p.key]; });
      }
    }

    function setDirty(d) {
      dirty = d;
      const btn = document.getElementById('saveBtn');
      btn.classList.toggle('saved', !d);
      btn.textContent = d ? 'Save' : 'Saved';
      document.getElementById('status').textContent = d ? 'Unsaved changes' : '';
    }

    window.save = async function() {
      try {
        const r = await fetch('/save-tuning', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(values) });
        if (!r.ok) throw 0;
        setDirty(false);
        document.getElementById('status').textContent = 'Saved! Refresh game to apply.';
        setTimeout(() => { if (!dirty) document.getElementById('status').textContent = ''; }, 3000);
      } catch(e) { document.getElementById('status').textContent = 'Save failed — is server.js running?'; }
    };

    window.resetAll = async function() {
      if (!confirm('Reset all values to defaults?')) return;
      for (const p of PARAMS) values[p.key] = p.default;
      await fetch('/save-tuning', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(values) });
      render(); setDirty(false);
      if (window.updatePreview) window.updatePreview(values);
    };

    await load(); render(); setDirty(false);
    if (window.updatePreview) window.updatePreview(values);
    document.getElementById('status').textContent = 'Loaded'; setTimeout(() => document.getElementById('status').textContent = '', 2000);
  </script>
</body>
</html>
